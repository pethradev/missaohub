<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Dashboard & Hub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        /* --- Variáveis de Tema --- */
        :root[data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #e6f0fa 0%, #d5e3f5 100%);
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.5);
            --text-main: #1a1f36;
            --text-muted: #6b7280;
            --accent: #2b70ff;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            --modal-bg: #ffffff;
            --hover-bg: rgba(0, 0, 0, 0.05);
            --sidebar-handle: var(--accent);
            --icon-bg: transparent;
        }

        :root[data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --modal-bg: #1e293b;
            --hover-bg: rgba(255, 255, 255, 0.1);
            --sidebar-handle: #334155;
            --icon-bg: transparent;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            transition: background 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        /* Botão Tema */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            color: var(--text-main);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
            z-index: 10;
        }
        .theme-toggle:hover { transform: scale(1.1); }

        /* Glassmorphism Cards */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            transition: background 0.3s, border-color 0.3s;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 350px 400px;
            gap: 20px;
            max-width: 800px;
            width: 100%;
        }

        .left-col, .right-col { display: flex; flex-direction: column; gap: 20px; }

        /* --- Módulo: Saudação e Relógio --- */
        .greeting h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 10px; }
        .greeting .time { font-size: 3.5rem; font-weight: 700; color: var(--accent); cursor: pointer; letter-spacing: -2px; }
        .greeting p { color: var(--text-muted); font-size: 0.9rem; }

        /* --- Módulo: Clima --- */
        .weather-module { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .weather-info h3 { font-size: 2.2rem; font-weight: 700; }
        .weather-info p { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }
        .weather-icon { font-size: 2.8rem; }

        /* --- Módulo: Pomodoro --- */
        .pomodoro-module { text-align: center; }
        .pomodoro-time { font-size: 4rem; font-weight: 700; letter-spacing: 2px; margin: 10px 0; color: var(--text-main); }
        .pomodoro-controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .pomodoro-btn {
            background: var(--accent); color: white; border: none; border-radius: 12px;
            width: 50px; height: 50px; font-size: 1.2rem; cursor: pointer; transition: 0.2s;
        }
        .pomodoro-btn:hover { transform: scale(1.05); opacity: 0.9; }
        .pomodoro-settings { font-size: 0.85rem; color: var(--text-muted); cursor: pointer; text-decoration: underline; }

        /* --- Módulo: Post-it --- */
        .postit-module {
            background: #fdf5c9;
            transition: background 0.3s;
            display: flex; flex-direction: column;
            color: #1a1f36; 
            min-height: 250px;
        }
        .postit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .postit-controls { display: flex; gap: 12px; align-items: center; color: #555; }
        .postit-controls i { cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        .postit-controls i:hover { color: var(--accent); transform: scale(1.1); }
        .color-picker { display: flex; gap: 5px; }
        .color-dot { width: 15px; height: 15px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        
        .postit-body { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .postit-textarea {
            flex: 1; width: 100%; min-height: 150px; background: transparent; border: none; outline: none;
            font-family: inherit; font-size: 0.95rem; color: inherit; resize: none;
        }
        
        /* Tasklist styles */
        .tasklist-container { display: none; flex-direction: column; flex: 1; }
        .task-ul { list-style: none; padding: 0; margin-bottom: 10px; }
        .task-li { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .task-li input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        .task-li input[type="text"] { 
            flex: 1; background: transparent; border: none; outline: none; font-family: inherit; font-size: 0.95rem; color: inherit;
        }
        .task-li.completed input[type="text"] { text-decoration: line-through; opacity: 0.6; }
        .task-add { 
            background: rgba(0,0,0,0.05); border: none; outline: none; padding: 8px; border-radius: 6px; 
            font-family: inherit; font-size: 0.9rem; width: 100%; color: inherit;
        }
        .task-add::placeholder { color: rgba(0,0,0,0.4); }

        /* --- Módulo: Calendário --- */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-header span { font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: 0.2s; }
        .calendar-header span:hover { background: var(--hover-bg); }
        .calendar-header i { cursor: pointer; padding: 5px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; font-size: 0.85rem; }
        .calendar-day-name { color: var(--text-muted); font-weight: 600; margin-bottom: 5px; }
        .calendar-day { padding: 8px; border-radius: 8px; cursor: pointer; position: relative; }
        .calendar-day:hover { background: var(--hover-bg); }
        .calendar-day.active { background: var(--accent); color: white; font-weight: bold; }
        
        /* Ponto indicador de evento */
        .calendar-day.has-event::after {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background-color: #888;
            border-radius: 50%;
        }
        .calendar-day.active.has-event::after {
            background-color: #fff; /* Ponto branco se o dia estiver ativo (azul) */
        }

        /* --- Módulo: Versículo --- */
        .verse-module { padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 550px; }
        .verse-iframe { flex: 1; width: 100%; border: none; }

        /* --- Menu Lateral Retrátil (Hub de Apps) - ESQUERDA --- */
        .sidebar-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            display: flex;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .sidebar-trigger-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 100vh;
            z-index: 99;
        }

        .sidebar-trigger-area:hover ~ .sidebar-wrapper,
        .sidebar-wrapper:hover {
            transform: translateX(0);
        }

        .hub-sidebar {
            width: 340px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid var(--card-border);
            padding: 30px 20px;
            overflow-y: auto;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }

        .sidebar-handle {
            position: absolute;
            right: -35px;
            top: 50%;
            transform: translateY(-50%);
            width: 35px;
            height: 100px;
            background: var(--sidebar-handle);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 0 12px 12px 0;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
            font-size: 1.2rem;
        }

        .hub-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; }
        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; text-align: center; }
        .app-item, .folder {
            display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; text-decoration: none; color: var(--text-main);
        }
        
        .folder-icon-container {
            width: 60px; height: 60px; background: var(--hover-bg); border-radius: 16px;
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 2px; padding: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.2s; border: 1px solid var(--card-border);
        }
        .folder-icon-container:hover { transform: scale(1.05); background: rgba(128,128,128,0.2); }
        .mini-icon { width: 100%; height: 100%; border-radius: 3px; background-size: contain; background-repeat: no-repeat; background-position: center; }
        
        .app-icon {
            width: 60px; height: 60px; border-radius: 16px; background-size: contain; background-repeat: no-repeat; background-position: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.2s; background-color: var(--icon-bg); border: none;
            padding: 8px; 
        }
        .app-icon:hover { transform: scale(1.05); }
        .app-name { font-size: 0.75rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 64px; }

        /* --- Modais --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 200;
        }
        .modal { 
            background: var(--modal-bg); color: var(--text-main); border-radius: 20px; 
            padding: 25px; width: 450px; max-width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.3); max-height: 80vh; overflow-y: auto;
        }
        .modal h3 { margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .modal-close { cursor: pointer; background: none; border: none; font-size: 1.5rem; color: var(--text-main); }
        
        .search-input { 
            width: 100%; padding: 12px; border: 1px solid var(--card-border); border-radius: 8px; 
            margin-bottom: 10px; font-family: inherit; background: var(--hover-bg); color: var(--text-main);
        }
        .search-results { max-height: 200px; overflow-y: auto; list-style: none; }
        .search-results li { padding: 10px; border-bottom: 1px solid var(--card-border); cursor: pointer; }
        .search-results li:hover { background: var(--hover-bg); }

        .folder-modal-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 20px; }

        /* Modal Notas Salvas */
        .saved-notes-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .saved-note-card {
            border-radius: 12px; padding: 15px; cursor: pointer; height: 100px; overflow: hidden;
            color: #1a1f36; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: transform 0.2s;
        }
        .saved-note-card:hover { transform: scale(1.05); }
        .saved-note-card .note-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; white-space: nowrap; text-overflow: ellipsis; overflow: hidden;}
        .saved-note-card .note-preview { font-size: 0.75rem; opacity: 0.8; }
        .saved-note-card .delete-btn { position: absolute; bottom: 8px; right: 8px; color: #ff4d4d; cursor: pointer; font-size: 0.9rem; }
        
        .action-btn { padding: 10px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; font-family: inherit; width: 100%; transition: 0.2s; }
        .action-btn:hover { opacity: 0.9; }
        .action-btn.danger { background: #ff4d4d; margin-bottom: 15px; }

        /* Botões da Grade do Calendário Modal */
        .cal-grid-btn {
            padding: 12px; border: none; border-radius: 8px; background: transparent; 
            color: var(--text-main); cursor: pointer; font-weight: 500; font-size: 1rem; 
            font-family: inherit; transition: 0.2s;
        }
        .cal-grid-btn:hover { background: var(--hover-bg); }
        .cal-grid-btn.active { background: var(--accent) !important; color: white !important; }

        /* Lista de Eventos (Calendário) */
        .event-item {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--hover-bg); padding: 10px; border-radius: 8px; margin-bottom: 8px;
        }
        .event-item-info { display: flex; flex-direction: column; }
        .event-item-time { font-size: 0.8rem; font-weight: 600; color: var(--accent); }
        .event-item-title { font-size: 0.95rem; }
        .event-actions i { cursor: pointer; margin-left: 10px; opacity: 0.7; transition: 0.2s; }
        .event-actions i:hover { opacity: 1; }
        .event-actions .fa-edit:hover { color: var(--accent); }
        .event-actions .fa-trash:hover { color: #ff4d4d; }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.3); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Botão de Alternar Tema (Direita) -->
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Alternar Modo Claro/Escuro">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Dashboard Principal -->
    <div class="dashboard-grid">
        <div class="left-col">
            <div class="card greeting">
                <h2>Olá! Que bom ter-te por aqui!</h2>
                <div class="time" id="main-clock" onclick="openTimezoneModal()">00:00:00</div>
                <p>Tem um dia produtivo.</p>
                <div id="extra-clocks" style="margin-top:10px; display:flex; gap:10px; font-size:0.8rem; color:var(--text-muted);"></div>
            </div>

            <div class="card weather-module" onclick="openWeatherModal()">
                <div class="weather-info">
                    <h3 id="temp">--°C</h3>
                    <p id="city-name">A carregar local...</p>
                </div>
                <div class="weather-icon" id="weather-emoji">☁️</div>
            </div>

            <div class="card pomodoro-module">
                <div class="pomodoro-time" id="pomo-display">25:00</div>
                <div class="pomodoro-controls">
                    <button class="pomodoro-btn" onclick="togglePomodoro()"><i class="fas fa-play" id="pomo-play-icon"></i></button>
                    <button class="pomodoro-btn" onclick="resetPomodoro()"><i class="fas fa-redo"></i></button>
                </div>
                <div class="pomodoro-settings" onclick="openPomodoroModal()">Ajustar tempos</div>
            </div>

            <!-- Post-it Atualizado -->
            <div class="card postit-module" id="postit-card">
                <div class="postit-header">
                    <div class="color-picker">
                        <div class="color-dot" style="background:#fdf5c9" onclick="changePostitColor('#fdf5c9')"></div>
                        <div class="color-dot" style="background:#c9fdf0" onclick="changePostitColor('#c9fdf0')"></div>
                        <div class="color-dot" style="background:#f8c9fd" onclick="changePostitColor('#f8c9fd')"></div>
                    </div>
                    <div class="postit-controls">
                        <i class="fas fa-list-check" title="Alternar Lista/Texto" onclick="togglePostitMode()"></i>
                        <i class="fas fa-save" title="Salvar Nota" onclick="saveCurrentNote()"></i>
                        <i class="fas fa-folder-open" title="Notas Salvas" onclick="openSavedNotesModal()"></i>
                    </div>
                </div>
                <div class="postit-body">
                    <!-- Modo Texto -->
                    <textarea class="postit-textarea" id="postit-text" placeholder="Escreve uma anotação..."></textarea>
                    
                    <!-- Modo Lista de Tarefas -->
                    <div class="tasklist-container" id="tasklist-container">
                        <ul class="task-ul" id="task-ul"></ul>
                        <input type="text" class="task-add" id="task-add-input" placeholder="+ Nova tarefa (Aperte Enter)" onkeypress="handleTaskEnter(event)">
                    </div>
                </div>
            </div>
        </div>

        <div class="right-col">
            <!-- Calendário -->
            <div class="card calendar-module">
                <div class="calendar-header">
                    <i class="fas fa-chevron-left" onclick="changeMonth(-1)"></i>
                    <span id="calendar-month-year" onclick="openCalendarModal()" title="Selecionar mês/ano">Mês Ano</span>
                    <i class="fas fa-chevron-right" onclick="changeMonth(1)"></i>
                </div>
                <div class="calendar-grid" id="calendar-days">
                    <!-- Gerado via JS -->
                </div>
            </div>

            <!-- Versículo do Dia (iFrame YouVersion) -->
            <div class="card verse-module">
                <iframe class="verse-iframe" src="https://www.bible.com/pt/verse-of-the-day"></iframe>
            </div>
        </div>
    </div>

    <!-- Hub de Links (Menu Lateral Retrátil - ESQUERDA) -->
    <div class="sidebar-trigger-area"></div>
    <div class="sidebar-wrapper">
        <div class="hub-sidebar">
            <h2 class="hub-title">Acessos Rápidos</h2>
            <div class="app-grid" id="hub-grid">
                <!-- Gerado via JS -->
            </div>
        </div>
        <div class="sidebar-handle">
            <i class="fas fa-chevron-right"></i>
        </div>
    </div>

    <!-- Modais Ocultos -->
    <div class="modal-overlay" id="search-modal">
        <div class="modal">
            <h3><span id="search-modal-title">Buscar Cidade</span> <button class="modal-close" onclick="closeModal('search-modal')">&times;</button></h3>
            <button class="action-btn" id="reset-weather-btn" style="display:none; margin-bottom: 15px;" onclick="detectMyWeatherLocation()"><i class="fas fa-location-crosshairs"></i> Auto-detetar Minha Localização</button>
            <input type="text" class="search-input" id="city-search" placeholder="Escreve o nome da cidade..." onkeyup="searchLocation(this.value)">
            <ul class="search-results" id="search-results"></ul>
        </div>
    </div>

    <div class="modal-overlay" id="folder-modal">
        <div class="modal">
            <h3><span id="folder-modal-title">Pasta</span> <button class="modal-close" onclick="closeModal('folder-modal')">&times;</button></h3>
            <div class="folder-modal-grid" id="folder-content"></div>
        </div>
    </div>

    <div class="modal-overlay" id="saved-notes-modal">
        <div class="modal">
            <h3><span>Minhas Notas Salvas</span> <button class="modal-close" onclick="closeModal('saved-notes-modal')">&times;</button></h3>
            <div class="saved-notes-grid" id="saved-notes-grid">
                <!-- Preenchido via JS -->
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="pomo-settings-modal">
        <div class="modal" style="width: 350px;">
            <h3><span>Ajustar Pomodoro</span> <button class="modal-close" onclick="closeModal('pomo-settings-modal')">&times;</button></h3>
            <div style="display:flex; flex-direction:column; gap:15px; margin-top: 15px;">
                <label>Foco (minutos): 
                    <input type="number" id="pomo-work-input" value="25" class="search-input" min="1" max="120" style="margin-bottom:0; margin-top:5px;">
                </label>
                <label>Pausa (minutos): 
                    <input type="number" id="pomo-break-input" value="5" class="search-input" min="1" max="60" style="margin-bottom:0; margin-top:5px;">
                </label>
                <button class="action-btn" onclick="savePomodoroSettings()">Salvar Tempos</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="calendar-selector-modal">
        <div class="modal" style="width: 380px; text-align: center;">
            <h3 style="text-align: left;"><span>Selecionar Data</span> <button class="modal-close" onclick="closeModal('calendar-selector-modal')">&times;</button></h3>
            
            <div id="cal-modal-nav" style="display:flex; justify-content:space-between; align-items:center; margin: 20px 0 30px 0; font-size: 1.2rem; font-weight: 500;">
                <!-- Gerado via JS -->
            </div>
            
            <div id="cal-modal-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px 10px;">
                <!-- Gerado via JS -->
            </div>
        </div>
    </div>

    <!-- Novo Modal: Compromissos do Dia -->
    <div class="modal-overlay" id="day-events-modal">
        <div class="modal" style="width: 400px;">
            <h3><span id="day-events-title">Compromissos</span> <button class="modal-close" onclick="closeModal('day-events-modal')">&times;</button></h3>
            
            <div id="day-events-list" style="margin: 15px 0; max-height: 200px; overflow-y: auto;">
                <!-- Preenchido via JS -->
            </div>

            <hr style="border: none; border-top: 1px solid var(--card-border); margin: 15px 0;">
            
            <h4 style="margin-bottom: 10px; font-size: 0.95rem;">Adicionar Novo</h4>
            <div style="display:flex; gap:10px; margin-bottom: 10px;">
                <input type="time" id="event-time" class="search-input" style="width: 120px; margin-bottom:0;">
                <input type="text" id="event-title" class="search-input" style="flex:1; margin-bottom:0;" placeholder="Título do compromisso">
            </div>
            <button class="action-btn" id="event-save-btn" onclick="saveEvent()">Salvar Compromisso</button>
        </div>
    </div>

    <script>
        // --- TEMA CLARO/ESCURO ---
        function toggleTheme() {
            const html = document.documentElement;
            const btnIcon = document.querySelector('#theme-btn i');
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('hub-theme', newTheme);
            
            if (newTheme === 'dark') {
                btnIcon.className = 'fas fa-sun';
            } else {
                btnIcon.className = 'fas fa-moon';
            }
        }

        // --- CLIMA ---
        async function fetchWeather(lat, lon, cityName) {
            try {
                document.getElementById('city-name').innerText = cityName;
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await res.json();
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                document.getElementById('temp').innerText = `${temp}°C`;
                
                let emoji = '☀️';
                if(code >= 1 && code <= 3) emoji = '⛅';
                if(code >= 45 && code <= 48) emoji = '🌫️';
                if(code >= 51 && code <= 67) emoji = '🌧️';
                if(code >= 71 && code <= 77) emoji = '❄️';
                if(code >= 95) emoji = '⛈️';
                document.getElementById('weather-emoji').innerText = emoji;

                // Salvar local escolhido
                localStorage.setItem('hubWeather', JSON.stringify({lat, lon, cityName}));
            } catch (e) { console.error("Erro clima", e); }
        }

        async function detectMyWeatherLocation() {
            closeModal('search-modal');
            document.getElementById('city-name').innerText = "A detetar...";
            document.getElementById('temp').innerText = "--°C";
            localStorage.removeItem('hubWeather');

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        try {
                            const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=pt`);
                            const data = await res.json();
                            const region = data.principalSubdivisionCode ? data.principalSubdivisionCode.split('-').pop() : data.principalSubdivision;
                            const cityName = `${data.city || data.locality}, ${region}`;
                            fetchWeather(lat, lon, cityName);
                        } catch (e) {
                            fetchWeather(lat, lon, "Localização Atual");
                        }
                    },
                    (error) => {
                        console.warn("Geolocalização negada ou falhou. Tentando por IP...", error);
                        fetchLocationByIP();
                    }
                );
            } else {
                fetchLocationByIP();
            }
        }

        async function fetchLocationByIP() {
            try {
                const res = await fetch('https://get.geojs.io/v1/ip/geo.json');
                const data = await res.json();
                fetchWeather(data.latitude, data.longitude, `${data.city}, ${data.region}`);
            } catch (e) {
                console.error("Falha ao obter localização por IP", e);
                fetchWeather(-7.11532, -34.86105, "João Pessoa, PB"); // Fallback final
            }
        }

        function togglePomodoro() {

                        pomoTime--; 
                        updatePomoDisplay(); 
                    } else { 
                        clearInterval(pomoInterval); 
                        isPomoRunning = false;
                        icon.className = 'fas fa-play';
                        
                        if(isPomoWorkSession) {

        // Solicita permissão para notificações
        function requestNotificationPermission() {
            if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        }

        // Loop verificador de notificações a cada 1 minuto
        setInterval(() => {
            if (Notification.permission !== "granted") return;
            
            const now = new Date();
            // Formata YYYY-MM-DD
            const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            // Formata HH:MM
            const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            
            if (scheduledEvents[dateStr]) {
                scheduledEvents[dateStr].forEach(ev => {
                    if (ev.time === timeStr) {
                        const notifId = `${dateStr}-${ev.id}`;
                        // Se ainda não notificou sobre este evento específico hoje
                        if (!notifiedEvents.includes(notifId)) {
                            new Notification("Lembrete de Compromisso", {
                                body: `${ev.time} - ${ev.title}`,
                                icon: 'https://cdn-icons-png.flaticon.com/512/833/833602.png' // Ícone genérico de calendário
                            });
                            notifiedEvents.push(notifId);
                            // Mantém o tamanho do array gerido para não inchar a localstorage (últimos 100)
                            if (notifiedEvents.length > 100) notifiedEvents.shift(); 
                            localStorage.setItem('hubNotifiedEvents', JSON.stringify(notifiedEvents));
                        }
                    }
                });
            }
        }, 60000); // 60.000 ms = 1 minuto

        function renderCalendar() {
            const daysContainer = document.getElementById('calendar-days'); 
            daysContainer.innerHTML = '';
            
            const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            document.getElementById('calendar-month-year').innerText = `${monthNames[currentMonth]} ${currentYear}`;
            
            ['D','S','T','Q','Q','S','S'].forEach(day => daysContainer.innerHTML += `<div class="calendar-day-name">${day}</div>`);
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay(); 
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const today = new Date();
            
            for(let i = 0; i < firstDay; i++) daysContainer.innerHTML += `<div></div>`;
            
            for(let i = 1; i <= daysInMonth; i++) {
                const isToday = i === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();
                const dateString = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                
                // Checar se há eventos para colocar a bolinha
                const hasEvents = scheduledEvents[dateString] && scheduledEvents[dateString].length > 0;
                
                daysContainer.innerHTML += `<div class="calendar-day ${isToday ? 'active' : ''} ${hasEvents ? 'has-event' : ''}" onclick="openDayEventsModal('${dateString}')">${i}</div>`;
            }
        }
        
        function changeMonth(dir) {

        function saveEvent() {
            const timeVal = document.getElementById('event-time').value;
            const titleVal = document.getElementById('event-title').value.trim();
            
            if (!timeVal || !titleVal) {
                alert("Por favor, preencha a hora e o título do compromisso.");
                return;
            }

            // Pede permissão caso ainda não tenha dado
            requestNotificationPermission();

            if (!scheduledEvents[selectedDateForEvent]) {
                scheduledEvents[selectedDateForEvent] = [];
            }

            if (editingEventId !== null) {
                // Editar existente
                const index = scheduledEvents[selectedDateForEvent].findIndex(e => e.id === editingEventId);
                if (index !== -1) {
                    scheduledEvents[selectedDateForEvent][index].time = timeVal;
                    scheduledEvents[selectedDateForEvent][index].title = titleVal;
                }
                editingEventId = null;
                document.getElementById('event-save-btn').innerText = 'Salvar Compromisso';
            } else {
                // Criar novo
                scheduledEvents[selectedDateForEvent].push({
                    id: Date.now(),
                    time: timeVal,
                    title: titleVal
                });
            }

            localStorage.setItem('hubCalendarEvents', JSON.stringify(scheduledEvents));
            
            document.getElementById('event-time').value = '';
            document.getElementById('event-title').value = '';
            
            renderDayEventsList();
            renderCalendar(); // Atualiza a visualização da grade (ponto cinza)
        }

        function prepareEditEvent(id) {
            const ev = scheduledEvents[selectedDateForEvent].find(e => e.id === id);
            if (ev) {
                document.getElementById('event-time').value = ev.time;
                document.getElementById('event-title').value = ev.title;
                editingEventId = id;
                document.getElementById('event-save-btn').innerText = 'Atualizar Compromisso';
            }
        }

        function deleteEvent(id) {
            if (confirm("Deseja mesmo remover este compromisso?")) {
                scheduledEvents[selectedDateForEvent] = scheduledEvents[selectedDateForEvent].filter(e => e.id !== id);
                
                // Limpa a data do objeto se não sobrar eventos
                if (scheduledEvents[selectedDateForEvent].length === 0) {
                    delete scheduledEvents[selectedDateForEvent];
                }
                
                localStorage.setItem('hubCalendarEvents', JSON.stringify(scheduledEvents));
                
                if (editingEventId === id) {
                    // Reseta o formulário se estiver apagando o que está editando
                    document.getElementById('event-time').value = '';
                    document.getElementById('event-title').value = '';
                    editingEventId = null;
                    document.getElementById('event-save-btn').innerText = 'Salvar Compromisso';
                }

                renderDayEventsList();
                renderCalendar();
            }
        }

        // --- MODAL DE SELEÇÃO DE MÊS/ANO/DÉCADA ---
        let calModalView = 'months';
        let calModalYear = currentYear;

        function openCalendarModal() {
            calModalView = 'months';
            calModalYear = currentYear;
            renderCalendarModal();
            document.getElementById('calendar-selector-modal').style.display = 'flex';
        }

        function renderCalendarModal() {
            const navContainer = document.getElementById('cal-modal-nav');
            const gridContainer = document.getElementById('cal-modal-grid');
            gridContainer.innerHTML = '';

            if (calModalView === 'months') {
                navContainer.innerHTML = `
                    <i class="fas fa-chevron-left" style="cursor:pointer; padding:10px; color: var(--accent);" onclick="calModalYear--; renderCalendarModal()"></i>
                    <span style="cursor:pointer; padding: 5px 15px; border-radius: 6px; transition: 0.2s;" onmouseover="this.style.background='var(--hover-bg)'" onmouseout="this.style.background='transparent'" onclick="calModalView = 'years'; renderCalendarModal()" title="Escolher outro ano">${calModalYear}</span>
                    <i class="fas fa-chevron-right" style="cursor:pointer; padding:10px; color: var(--accent);" onclick="calModalYear++; renderCalendarModal()"></i>
                `;

                const months = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
                months.forEach((m, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'cal-grid-btn';
                    btn.innerText = m;
                    
                    if (calModalYear === currentYear && i === currentMonth) {
                        btn.classList.add('active');
                    }
                    
                    btn.onclick = () => {
                        currentYear = calModalYear;
                        currentMonth = i;
                        renderCalendar();
                        closeModal('calendar-selector-modal');
                    };
                    gridContainer.appendChild(btn);
                });

            } else if (calModalView === 'years') {
                const startYear = calModalYear - (calModalYear % 12); 
                const endYear = startYear + 11;

                navContainer.innerHTML = `
                    <i class="fas fa-chevron-left" style="cursor:pointer; padding:10px; color: var(--accent);" onclick="calModalYear -= 12; renderCalendarModal()"></i>
                    <span>${startYear} - ${endYear}</span>
                    <i class="fas fa-chevron-right" style="cursor:pointer; padding:10px; color: var(--accent);" onclick="calModalYear += 12; renderCalendarModal()"></i>
                `;

                for (let y = startYear; y <= endYear; y++) {
                    const btn = document.createElement('button');
                    btn.className = 'cal-grid-btn';
                    btn.innerText = y;
                    
                    if (y === currentYear) {
                        btn.classList.add('active');
                    }

                    btn.onclick = () => {
                        calModalYear = y;
                        calModalView = 'months';
                        renderCalendarModal();
                    };
                    gridContainer.appendChild(btn);
                }
            }
        }

        renderCalendar(); 

        // --- RENDERIZAR HUB DE LINKS ---
        const hubGrid = document.getElementById('hub-grid');
        linksData.folders.forEach(folder => {
            const folderDiv = document.createElement('div'); folderDiv.className = 'folder'; folderDiv.onclick = () => openAppFolder(folder);
            const iconContainer = document.createElement('div'); iconContainer.className = 'folder-icon-container';
            folder.apps.slice(0, 9).forEach(app => {
                const mini = document.createElement('div'); mini.className = 'mini-icon'; mini.style.backgroundImage = `url('${app.icon}')`;
                iconContainer.appendChild(mini);
            });
            folderDiv.appendChild(iconContainer); folderDiv.innerHTML += `<span class="app-name">${folder.name}</span>`; hubGrid.appendChild(folderDiv);
        });
        linksData.standalone.forEach(app => {
            const a = document.createElement('a'); a.className = 'app-item'; a.href = app.url; a.target = '_blank';
            a.innerHTML = `<div class="app-icon" style="background-image: url('${app.icon}')"></div><span class="app-name">${app.name}</span>`;
            hubGrid.appendChild(a);
        });

        function openAppFolder(folder) {
            document.getElementById('folder-modal-title').innerText = folder.name;
            const content = document.getElementById('folder-content'); content.innerHTML = '';
            folder.apps.forEach(app => {
                const a = document.createElement('a'); a.className = 'app-item'; a.href = app.url; a.target = '_blank';
                a.innerHTML = `<div class="app-icon" style="background-image: url('${app.icon}')"></div><span class="app-name">${app.name}</span>`;
                content.appendChild(a);
            });
            document.getElementById('folder-modal').style.display = 'flex';
        }
    </script>
</body>
</html>
